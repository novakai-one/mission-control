name: CI
on:
  pull_request:
  push:
    branches: [main]
jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npx tsc --noEmit
      # ponytail: no test runner in repo; plain tsx scripts, discovered by name
      - run: |
          for t in $(find src -name '*.test.ts' -not -path '*/node_modules/*'); do
            npx tsx "$t"
          done
      - run: npm run stores:test
      - run: npm run lint
      - run: npm run build
