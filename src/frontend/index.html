<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Novakai Command - Agent Commander</title>
  <!-- Inline icon: no /favicon.ico exists, and the browser's automatic request
       for one was the 404 on every page load (round 3, M8). -->
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Crect width='16' height='16' rx='3' fill='%231b1b1e'/%3E%3Ctext x='3' y='12' font-family='monospace' font-size='10' fill='%23d7a842'%3E%3E_%3C/text%3E%3C/svg%3E">
  <script>
    // Apply persisted theme/font before first paint so there's no flash.
    // KEEP IN SYNC: theme id list also lives in css/index.css (:root[data-theme=...] rules) and lib/theme/index.ts (THEMES).
    try {
      var root = document.documentElement;
      root.dataset.theme = localStorage.getItem('mc-theme') || 'command';
      root.dataset.font = localStorage.getItem('mc-font') || 'plex';
      root.dataset.mode = ['graphite', 'fog', 'slate'].indexOf(root.dataset.theme) >= 0 ? 'light' : 'dark';
    } catch (e) {}
  </script>
  <link rel="stylesheet" href="./css/index.css">
</head>
<body>
  <div id="root"></div>
  <script type="module" src="./main.tsx"></script>
</body>
</html>
