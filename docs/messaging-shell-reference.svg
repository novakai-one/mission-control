<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000" role="img" aria-labelledby="title desc">
  <title id="title">Novakai Command messaging-first shared shell reference</title>
  <desc id="desc">Two page examples share one header, left panel, workspace and right panel. A click progression demonstrates inspect first and explicit navigation second.</desc>
  <defs>
    <style>
      .bg { fill: #0d0d0f; }
      .panel { fill: #121214; stroke: #2b2b30; stroke-width: 1; }
      .raised { fill: #1b1b1e; stroke: #36363b; stroke-width: 1; }
      .selected { fill: #252529; stroke: #626269; stroke-width: 1; }
      .gold { fill: #d0a14b; }
      .sage { fill: #78a886; }
      .ink { fill: #ececee; font: 500 15px Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .body { fill: #b5b5bc; font: 400 13px Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .muted { fill: #7d7d86; font: 400 12px Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .label { fill: #8b8b94; font: 500 11px Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; letter-spacing: 1.4px; }
      .title { fill: #ececee; font: 500 22px Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .small { fill: #8b8b94; font: 400 10px Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .line { stroke: #36363b; stroke-width: 1; fill: none; }
      .arrow { stroke: #8b8b94; stroke-width: 1.5; fill: none; marker-end: url(#arrow); }
      .gold-stroke { stroke: #d0a14b; stroke-width: 2; fill: none; }
    </style>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#8b8b94"/>
    </marker>
  </defs>

  <rect class="bg" width="1600" height="1000"/>

  <text x="48" y="48" class="title">ONE FRAME · CONTEXTUAL CONTENTS</text>
  <text x="48" y="76" class="body">The geometry does not change between pages. The first click inspects in place; explicit actions travel.</text>

  <!-- Mission Control frame -->
  <g transform="translate(48 112)">
    <rect class="panel" x="0" y="0" width="1504" height="360" rx="8"/>
    <rect class="raised" x="0" y="0" width="1504" height="50" rx="8"/>
    <path class="line" d="M0 50 H1504"/>
    <text x="18" y="31" class="ink">NOVAKAI COMMAND</text>
    <text x="238" y="31" class="ink">Mission Control</text>
    <text x="376" y="31" class="muted">Organization</text>
    <text x="490" y="31" class="muted">Messages</text>
    <text x="1430" y="31" class="muted">Settings</text>

    <rect class="panel" x="0" y="50" width="224" height="310"/>
    <rect class="panel" x="224" y="50" width="976" height="310"/>
    <rect class="panel" x="1200" y="50" width="304" height="310"/>
    <path class="line" d="M224 50 V360 M1200 50 V360"/>

    <text x="18" y="78" class="label">LEFT PANEL · INDEX</text>
    <text x="18" y="106" class="ink">Mission rooms</text>
    <rect class="selected" x="12" y="120" width="200" height="42" rx="6"/>
    <text x="28" y="145" class="ink"># One home for AI</text>
    <text x="28" y="186" class="body"># Design guild</text>
    <text x="18" y="226" class="ink">Direct messages</text>
    <text x="28" y="260" class="body">Guild Design · codex</text>
    <text x="28" y="292" class="body">Messaging Audit · opus</text>
    <rect class="raised" x="188" y="62" width="24" height="24" rx="4"/>
    <text x="195" y="79" class="small">◧</text>

    <text x="248" y="78" class="label">MAIN WORKSPACE · SELECTED OBJECT</text>
    <text x="248" y="110" class="title">One home for AI</text>
    <text x="248" y="134" class="muted">Selected mission · conversation remains in Mission Control</text>
    <rect class="raised" x="248" y="154" width="928" height="132" rx="6"/>
    <text x="266" y="180" class="label">SHARED CONVERSATION</text>
    <text x="266" y="210" class="body">Chris: We need one stable shell and messaging that behaves like common sense.</text>
    <text x="266" y="238" class="body">Codex: Inspect first, then offer an explicit action to travel.</text>
    <rect class="selected" x="266" y="250" width="892" height="24" rx="4"/>
    <text x="278" y="267" class="muted">Write a message…</text>
    <text x="248" y="324" class="small">The workspace updates in place. Selecting a Room or DM does not change page.</text>

    <text x="1220" y="78" class="label">RIGHT PANEL · CONTEXT</text>
    <text x="1220" y="108" class="ink">Live squad</text>
    <rect class="selected" x="1212" y="122" width="280" height="54" rx="6"/>
    <circle class="sage" cx="1238" cy="149" r="5"/>
    <text x="1254" y="145" class="ink">Messaging Audit · opus</text>
    <text x="1254" y="162" class="small">Selected · inspecting in place</text>
    <text x="1220" y="208" class="body">Current mission</text>
    <text x="1220" y="232" class="muted">Messaging recovery</text>
    <rect class="raised" x="1220" y="256" width="116" height="34" rx="6"/>
    <text x="1250" y="278" class="ink">Message</text>
    <rect class="raised" x="1348" y="256" width="128" height="34" rx="6"/>
    <text x="1371" y="278" class="ink">Open profile</text>
    <rect class="raised" x="1212" y="62" width="24" height="24" rx="4"/>
    <text x="1219" y="79" class="small">◨</text>

    <path class="gold-stroke" d="M1210 116 H1494 V182 H1210 Z"/>
    <text x="1208" y="338" class="small">FIRST CLICK: select + inspect · SECOND ACTION: Message / Open profile</text>
  </g>

  <!-- Messages frame -->
  <g transform="translate(48 500)">
    <rect class="panel" x="0" y="0" width="1504" height="300" rx="8"/>
    <rect class="raised" x="0" y="0" width="1504" height="50" rx="8"/>
    <path class="line" d="M0 50 H1504"/>
    <text x="18" y="31" class="ink">NOVAKAI COMMAND</text>
    <text x="238" y="31" class="muted">Mission Control</text>
    <text x="376" y="31" class="muted">Organization</text>
    <text x="490" y="31" class="ink">Messages</text>
    <text x="1430" y="31" class="muted">Settings</text>

    <rect class="panel" x="0" y="50" width="224" height="250"/>
    <rect class="panel" x="224" y="50" width="976" height="250"/>
    <rect class="panel" x="1200" y="50" width="304" height="250"/>
    <path class="line" d="M224 50 V300 M1200 50 V300"/>

    <text x="18" y="78" class="label">LEFT PANEL · CONVERSATIONS</text>
    <rect class="selected" x="12" y="94" width="200" height="42" rx="6"/>
    <text x="28" y="119" class="ink">Guild Design · codex</text>
    <text x="28" y="160" class="body"># One home for AI</text>
    <text x="28" y="192" class="body"># team</text>
    <text x="28" y="224" class="body">Messaging Audit · opus</text>
    <rect class="raised" x="18" y="248" width="188" height="34" rx="6"/>
    <text x="72" y="270" class="ink">New conversation</text>

    <text x="248" y="78" class="label">MAIN WORKSPACE · CANONICAL THREAD</text>
    <text x="248" y="108" class="title">Guild Design · codex</text>
    <text x="248" y="136" class="body">The same Thread identity is shown wherever it is projected.</text>
    <rect class="raised" x="248" y="154" width="928" height="74" rx="6"/>
    <text x="266" y="180" class="body">Delivered message and reply appear exactly once.</text>
    <text x="266" y="208" class="muted">Receipt: delivered · Draft remains isolated by Thread</text>
    <rect class="selected" x="248" y="240" width="928" height="42" rx="6"/>
    <text x="266" y="266" class="muted">Say it in your own words…</text>

    <text x="1220" y="78" class="label">RIGHT PANEL · THREAD CONTEXT</text>
    <text x="1220" y="108" class="ink">Participants</text>
    <text x="1220" y="138" class="body">Chris</text>
    <text x="1220" y="166" class="body">Guild Design · codex</text>
    <text x="1220" y="208" class="ink">Related mission</text>
    <text x="1220" y="234" class="muted">Messaging recovery</text>
    <rect class="raised" x="1220" y="248" width="150" height="34" rx="6"/>
    <text x="1246" y="270" class="ink">Inspect mission</text>
  </g>

  <!-- Interaction and motion rules -->
  <g transform="translate(48 832)">
    <text x="0" y="0" class="label">CLICK PROGRESSION</text>
    <rect class="raised" x="0" y="20" width="216" height="62" rx="6"/>
    <text x="18" y="45" class="ink">1 · Click entity</text>
    <text x="18" y="66" class="muted">No page change</text>
    <path class="arrow" d="M224 51 H280"/>
    <rect class="selected" x="288" y="20" width="252" height="62" rx="6"/>
    <text x="306" y="45" class="ink">2 · Inspect in place</text>
    <text x="306" y="66" class="muted">Selection + useful context</text>
    <path class="arrow" d="M548 51 H604"/>
    <rect class="raised" x="612" y="20" width="252" height="62" rx="6"/>
    <text x="630" y="45" class="ink">3 · Explicit action</text>
    <text x="630" y="66" class="muted">Message · Open · Go to</text>
    <path class="arrow" d="M872 51 H928"/>
    <rect class="raised" x="936" y="20" width="216" height="62" rx="6"/>
    <text x="954" y="45" class="ink">4 · Travel</text>
    <text x="954" y="66" class="muted">Only when requested</text>

    <text x="1200" y="0" class="label">PANEL LAW</text>
    <rect class="panel" x="1200" y="20" width="304" height="62" rx="6"/>
    <rect class="raised" x="1212" y="31" width="32" height="40" rx="4"/>
    <path class="arrow" d="M1254 51 H1300"/>
    <rect class="raised" x="1308" y="31" width="148" height="40" rx="4"/>
    <text x="1322" y="48" class="small">700ms clip-slide</text>
    <text x="1322" y="64" class="small">resize + persist</text>
  </g>

  <text x="48" y="968" class="muted">Reference decision: one persistent frame; contextual contents; inspect first; explicit travel; canonical Thread identity.</text>
</svg>
