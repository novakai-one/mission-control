<script>
/* ================================================================ RENDERER
   This script is the entire "organisation" layer. It may: group tool records
   into categories, count them, format timestamps, split reply text on its own
   blank lines / list markers / bold headings, and truncate long strings for
   display (the studio always offers the untruncated source). It never
   rewrites a word. */
const DATA = JSON.parse(document.getElementById('transcript').textContent);
const flow = document.getElementById('flow');

/* ---------- mechanical helpers ---------- */
const TZ = 'Australia/Sydney';
const t = ts => new Intl.DateTimeFormat('en-AU',{hour:'numeric',minute:'2-digit',hour12:true,timeZone:TZ}).format(new Date(ts)).replace(/\s?([ap]m)/i,' $1');
const esc = s => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const md = s => esc(s).replace(/\*\*(.+?)\*\*/gs,'<b>$1</b>').replace(/`([^`]+)`/g,'<code>$1</code>');
const base = p => p.split('/').pop();
const el = html => { const d=document.createElement('div'); d.innerHTML=html.trim(); return d.firstChild; };

/* ---------- studio ---------- */
const studio = document.getElementById('studio');
const sKick = document.getElementById('s-kick'), sTitle = document.getElementById('s-title'), sBody = document.getElementById('s-body');
let openKey = null;
function openStudio(key, kick, title, html) {
  const fill = () => { sKick.textContent=kick; sTitle.textContent=title; sBody.innerHTML=html; };
  if (studio.classList.contains('open') && openKey !== key) {
    sBody.classList.add('swap');
    setTimeout(() => { fill(); sBody.classList.remove('swap'); sBody.scrollTop=0; }, 360);
  } else fill();
  studio.classList.add('open'); openKey = key;
}
function closeStudio(){ studio.classList.remove('open'); openKey=null; }
document.getElementById('s-close').addEventListener('click', closeStudio);
document.addEventListener('keydown', e => { if (e.key==='Escape') closeStudio(); });

/* ---------- header facts (from the JSONL envelope) ---------- */
document.getElementById('who').textContent = `claude · ${DATA.session.id} · v${DATA.session.version}`;
document.getElementById('rail-cwd').textContent = DATA.session.cwd.replace('/Users/christopherdasca','~');
document.getElementById('sess-label').textContent = `claude · ${DATA.session.id}`;
document.getElementById('crumb-branch').textContent = DATA.session.gitBranch;

/* ---------- composer reply targeting ---------- */
function setReply(ref, act) {
  const ctx = document.querySelector('.composer .ctx');
  document.querySelectorAll('.p-act.replying').forEach(a=>a.classList.remove('replying'));
  if (act.dataset.on === '1') { clearReply(); return; }
  document.querySelectorAll('.p-act').forEach(a=>a.dataset.on='0');
  act.dataset.on='1'; act.classList.add('replying');
  ctx.classList.add('replying');
  ctx.querySelector('.lbl').innerHTML = `Replying To <b>${esc(ref)}</b>`;
  document.querySelector('.composer textarea').focus();
}
function clearReply() {
  const ctx = document.querySelector('.composer .ctx');
  ctx.classList.remove('replying');
  ctx.querySelector('.lbl').innerHTML = 'To <b>Claude</b>';
  document.querySelectorAll('.p-act.replying').forEach(a=>{a.classList.remove('replying');a.dataset.on='0';});
}
document.querySelector('.composer .clr').addEventListener('click', clearReply);

/* ---------- reply text → caption + parts (splits on the text's own structure) ---------- */
const ITEM = /^(?:(\d+)\.\s+|-\s+)/;
function parseReply(text) {
  const blocks = text.split(/\n{2,}/);
  const caption = blocks.shift();
  const groups = []; // {label} | {num,title,body,raw}
  for (const block of blocks) {
    const lines = block.split('\n');
    if (lines.length===1 && /^\*\*.+\*\*:?$/.test(lines[0].trim())) { groups.push({label:lines[0].replace(/\*\*/g,'').trim()}); continue; }
    if (ITEM.test(lines[0])) {
      let cur = null;
      for (const ln of lines) {
        const m = ln.match(ITEM);
        if (m) { if (cur) groups.push(cur); cur = { num:m[1]||null, raw:ln, body:ln.replace(ITEM,'') }; }
        else if (cur) { cur.raw += '\n'+ln; cur.body += '\n'+ln.trim(); }
      }
      if (cur) groups.push(cur);
    } else {
      groups.push({ num:null, raw:block, body:block });
    }
  }
  let seq = 0;
  for (const g of groups) {
    if (g.label !== undefined) continue;
    seq++;
    g.n = g.num || String(seq);
    const tm = g.body.match(/^\*\*(.+?)\*\*\s*[—:–-]?\s*/s);
    if (tm) { g.title = tm[1].replace(/:$/,''); g.rest = g.body.slice(tm[0].length); }
    else { g.title = null; g.rest = g.body; }
  }
  return { caption, groups };
}

/* ---------- render: user ---------- */
function renderUser(ev) {
  const paras = ev.text.split(/\n{2,}/);
  const first = paras.shift();
  const rest = paras.join('\n\n');
  const msg = el(`<div class="msg${rest?' u-fold':''}">
    <div class="by you"><b>You</b> · ${t(ev.ts)}</div>
    <div class="say">${esc(first)}</div>
  </div>`);
  if (rest) {
    const lineCount = rest.split('\n').filter(l=>l.trim()).length;
    const imgs = ev.images.length;
    const more = el(`<button class="u-more">${lineCount} More Lines${imgs?` · ${imgs} Image${imgs>1?'s':''}`:''}</button>`);
    const body = el(`<div class="u-body"><div><div class="u-inner"><div class="say">${esc(rest)}</div>${ev.images.map(p=>`<div class="u-img">Image · ${esc(base(p))}</div>`).join('')}</div></div></div>`);
    more.addEventListener('click', ()=>msg.classList.toggle('u-open'));
    msg.append(more, body);
  } else if (ev.images.length) {
    msg.append(el(`<div class="u-img">${ev.images.map(p=>'Image · '+esc(base(p))).join(' · ')}</div>`));
  }
  flow.append(msg);
}

/* ---------- render: hook ---------- */
function renderHook(ev) {
  const trace = el(`<div class="trace"></div>`);
  const row = el(`<button class="trow"><span class="tk${ev.exitCode===0?' ok':''}"></span><span class="tl"><b>Hook</b> · ${esc(ev.name)} · Exit ${ev.exitCode} · ${ev.durationMs}ms</span><span class="tn">${t(ev.ts)}</span></button>`);
  row.addEventListener('click', ()=>openStudio('hook'+ev.ts, `Hook · ${t(ev.ts)}`, ev.name, `
    <div class="s-sec">
      <div class="s-row"><span class="f">Command</span><span class="g">${esc(ev.command)}</span></div>
      <div class="s-row"><span class="f">Stdout</span><span class="g">${esc(ev.stdout)}</span></div>
      <div class="s-row"><span class="f">Exit</span><span class="g${ev.exitCode===0?' ok':''}">${ev.exitCode}</span></div>
      <div class="s-row"><span class="f">Duration</span><span class="g">${ev.durationMs}ms</span></div>
    </div>`));
  trace.append(row); flow.append(trace);
}

/* ---------- render: work — group real tool records into rows ---------- */
let workN = 0;
function renderWork(ev) {
  workN++;
  const reads = ev.tools.filter(x=>x.tool==='Read' && !x.png);
  const shots = ev.tools.filter(x=>x.tool==='Read' && x.png);
  const edits = ev.tools.filter(x=>x.tool==='Edit');
  const writes = ev.tools.filter(x=>x.tool==='Write');
  const bash  = ev.tools.filter(x=>x.tool==='Bash');
  const isCheck = c => /\btsc\b|npm run lint|eslint|npm run build/.test(c);
  const isBrowse = c => /browse\.mjs|launch\.sh/.test(c);
  const isBranch = c => /git checkout -b/.test(c);
  const isCommit = c => /git commit/.test(c);
  const checks = bash.filter(x=>isCheck(x.command));
  const browse = bash.filter(x=>isBrowse(x.command)&&!isCheck(x.command));
  const branches = bash.filter(x=>isBranch(x.command));
  const commits = bash.filter(x=>isCommit(x.command));
  const other = bash.filter(x=>!isCheck(x.command)&&!isBrowse(x.command)&&!isBranch(x.command)&&!isCommit(x.command));

  const editFiles = {};
  for (const x of [...edits,...writes]) editFiles[x.path] = (editFiles[x.path]||0)+1;
  const writeSet = new Set(writes.map(x=>x.path));

  const trace = el(`<div class="trace"></div>`);
  const key = k => `w${workN}-${k}`;
  const pending = [];
  const row = (k, dotOk, label, ts, studioFn) => {
    const r = el(`<button class="trow"><span class="tk${dotOk?' ok':''}"></span><span class="tl">${label}</span><span class="tn">${t(ts)}</span></button>`);
    r.addEventListener('click', ()=>studioFn());
    pending.push({ ts, r });
  };
  const n = (c, w) => `${c} ${w}${c===1?'':'s'}`;
  const cmdSec = list => list.map(x=>`
    <div class="s-sec">${x.description?`<div class="s-label">${esc(x.description)} · ${t(x.ts)}</div>`:`<div class="s-label">${t(x.ts)}</div>`}
      <div class="s-mono">${esc(x.command)}</div>
      ${x.result?`<div class="s-label" style="margin-top:10px">Output</div><div class="s-mono">${esc(x.result)}</div>`:''}
    </div>`).join('');

  if (reads.length) row(key('read'), false, `<b>Read</b> · ${n(reads.length,'File')}`, reads[0].ts,
    ()=>openStudio(key('read'), `Read · ${t(reads[0].ts)} – ${t(reads[reads.length-1].ts)}`, n(reads.length,'File'),
      `<div class="s-sec">${reads.map(x=>`<div class="s-row"><span class="f">${esc(x.path)}</span><span class="g">${t(x.ts)}</span></div>`).join('')}</div>`));

  for (const x of branches) row(key('branch'), false, `<b>Branch</b> · ${esc((x.command.match(/git checkout -b (\S+)/)||[])[1]||'')}`, x.ts,
    ()=>openStudio(key('branch'), `Branch · ${t(x.ts)}`, (x.command.match(/git checkout -b (\S+)/)||[])[1]||'', cmdSec([x])));

  if (Object.keys(editFiles).length) {
    const files = Object.keys(editFiles);
    row(key('edit'), false, `<b>Edits</b> · ${n(files.length,'File')} · ${n(edits.length+writes.length,'Change')}`, [...edits,...writes][0].ts,
      ()=>openStudio(key('edit'), `Edits · ${t([...edits,...writes][0].ts)}`, `${n(files.length,'File')} · ${n(edits.length+writes.length,'Change')}`,
        `<div class="s-sec">${files.map(p=>`<div class="s-row"><span class="f">${esc(p)}</span><span class="g">${writeSet.has(p)?'Write + ':''}${editFiles[p]-(writeSet.has(p)?1:0)||''}${editFiles[p]-(writeSet.has(p)?1:0)?' Edits':''}</span></div>`).join('')}</div>`));
  }

  if (checks.length) row(key('check'), true, `<b>Checks</b> · ${n(checks.length,'Run')}`, checks[0].ts,
    ()=>openStudio(key('check'), `Checks · ${t(checks[0].ts)} – ${t(checks[checks.length-1].ts)}`, n(checks.length,'Run'), cmdSec(checks)));

  if (browse.length || shots.length) {
    const ts0 = (browse[0]||shots[0]).ts;
    row(key('browse'), true, `<b>Browser</b> · ${n(browse.length,'Command')} · ${n(shots.length,'Screenshot')}`, ts0,
      ()=>openStudio(key('browse'), `Browser · ${t(ts0)}`, `${n(browse.length,'Command')} · ${n(shots.length,'Screenshot')}`,
        (shots.length?`<div class="s-sec"><div class="s-label">Screenshots Read</div>${shots.map(x=>`<div class="s-row"><span class="f">${esc(x.path)}</span><span class="g">${t(x.ts)}</span></div>`).join('')}</div>`:'') + cmdSec(browse)));
  }

  if (other.length) row(key('cmd'), false, `<b>Commands</b> · ${other.length}`, other[0].ts,
    ()=>openStudio(key('cmd'), `Commands · ${t(other[0].ts)}`, `${other.length} Runs`, cmdSec(other)));

  if (ev.narration.length) row(key('narr'), false, `<b>Narration</b> · ${n(ev.narration.length,'Note')}`, ev.narration[0].ts,
    ()=>openStudio(key('narr'), `Narration · ${t(ev.narration[0].ts)}`, `${n(ev.narration.length,'Note')} While Working`,
      ev.narration.map(x=>`<div class="s-sec"><div class="s-label">${t(x.ts)}</div><div class="s-note">${md(x.text)}</div></div>`).join('')));

  for (const x of commits) {
    const hashLine = (x.result||'').split('\n').find(l=>/^[0-9a-f]{8} /.test(l)) || '';
    row(key('commit')+x.ts, true, `<b>Commit</b> · ${esc(hashLine.slice(0,8) || 'git commit')}`, x.ts,
      ()=>openStudio(key('commit')+x.ts, `Commit · ${t(x.ts)}`, hashLine.slice(0,8)||'git commit', cmdSec([x])));
  }

  pending.sort((a,b)=>a.ts.localeCompare(b.ts)).forEach(x=>trace.append(x.r));
  flow.append(trace);

  /* the reply — caption + parts from the reply's own structure */
  if (ev.reply) renderReply(ev.reply);
}

function renderReply(reply) {
  const { caption, groups } = parseReply(reply.text);
  const msg = el(`<div class="msg">
    <div class="by"><b>Claude</b> · ${t(reply.ts)}</div>
    <div class="cap">${md(caption)}</div>
  </div>`);
  if (groups.length) {
    const parts = el(`<div class="parts"></div>`);
    for (const g of groups) {
      if (g.label !== undefined) { parts.append(el(`<div class="plabel">${esc(g.label)}</div>`)); continue; }
      const lineTitle = g.title !== null ? g.title : g.rest;
      const ref = `${g.n.padStart(2,'0')} · ${lineTitle.split('\n')[0].slice(0,60)}`;
      const part = el(`<div class="part">
        <button class="p-line" aria-expanded="false">
          <span class="i">${g.n.padStart(2,'0')}</span><span class="t">${md(lineTitle.split('\n')[0])}</span>
          <span class="p-act" data-act="reply" role="button" tabindex="0">Reply</span>
          <span class="p-act" data-act="raw" role="button" tabindex="0">Raw</span>
        </button>
        <div class="p-body"><div><div class="p-inner"><p>${md(g.rest)}</p></div></div></div>
      </div>`);
      const line = part.querySelector('.p-line');
      line.addEventListener('click', e => {
        const act = e.target.closest('.p-act');
        if (act) {
          e.stopPropagation();
          if (act.dataset.act==='raw') { openStudio('raw'+ref, `Verbatim · ${t(reply.ts)}`, ref, `<div class="s-sec"><div class="s-mono">${esc(g.raw)}</div></div>`); return; }
          setReply(ref, act); return;
        }
        const open = part.classList.toggle('open');
        line.setAttribute('aria-expanded', open);
      });
      parts.append(part);
    }
    msg.append(parts);
  }
  flow.append(msg);
}

/* ---------- run ---------- */
for (const ev of DATA.events) {
  if (ev.kind==='hook') renderHook(ev);
  else if (ev.kind==='user') renderUser(ev);
  else if (ev.kind==='work') renderWork(ev);
}
</script>
</body>
</html>
