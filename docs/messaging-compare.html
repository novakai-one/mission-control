<html lang="en">
<head>

<title>Novakai — Real Conversation vs. Calm Idea</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;450;500;600&display=swap');
:root{
  --stage:#0a0a0c;--panel:#0d0d0f;--panel-2:#111114;--panel-3:#16161a;--panel-4:#1c1c21;
  --ink:#ececee;--muted:#a2a2aa;--faint:#8b8b94;--faintest:#5f5f66;
  --line:rgba(236,236,238,.055);--line-2:rgba(236,236,238,.10);--line-3:rgba(236,236,238,.16);
  --gold:#d0a14b;--sage:#78a886;
  --r:8px;--r-sm:6px;--r-xs:4px;
  --sans:'Inter',-apple-system,system-ui,'Segoe UI',sans-serif;--mono:var(--sans);
  --slow:700ms;--ease:cubic-bezier(.33,0,.16,1);
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;}
body{background:var(--stage);color:var(--ink);font-family:var(--sans);font-size:13px;font-weight:400;line-height:1.6;letter-spacing:.002em;-webkit-font-smoothing:antialiased;overflow:hidden;}
button,textarea,input{font:inherit;color:inherit;}
::selection{background:rgba(236,236,238,.13);}
::-webkit-scrollbar{width:10px;height:10px;}
::-webkit-scrollbar-thumb{background:var(--panel-4);border-radius:6px;border:3px solid transparent;background-clip:padding-box;}
::-webkit-scrollbar-track{background:transparent;}
*{scrollbar-width:thin;scrollbar-color:var(--panel-4) transparent;}
:focus{outline:none;}
:focus-visible{outline:1.5px solid var(--line-3);outline-offset:2px;border-radius:3px;}
@keyframes breathe{0%,100%{opacity:1}50%{opacity:.35}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}

.frame{height:100%;display:grid;grid-template-rows:auto 1fr;}
/* top bar */
.top{display:flex;align-items:center;gap:14px;padding:12px 20px;border-bottom:1px solid var(--line);background:var(--panel);}
.top .g{color:var(--gold);font-weight:600;font-size:12px;}
.top b{font-weight:600;letter-spacing:-.005em;}
.top b span{color:var(--faintest);font-weight:400;}
.top .meta{margin-left:auto;font-size:9.5px;letter-spacing:.04em;color:var(--faintest);text-transform:uppercase;text-align:right;line-height:1.5;}

/* two panes */
.panes{display:grid;grid-template-columns:1fr 1fr;min-height:0;}
.pane-col{min-width:0;min-height:0;display:flex;flex-direction:column;position:relative;overflow:hidden;}
.pane-col.left{border-right:1px solid var(--line-2);background:var(--panel);}
.pane-col.right{background:var(--stage);}
.pane-head{height:46px;flex:0 0 auto;display:flex;align-items:center;gap:12px;padding:0 22px;border-bottom:1px solid var(--line);user-select:none;}
.pane-head .h-t{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--faint);}
.pane-head .h-s{font-size:9.5px;letter-spacing:.03em;color:var(--faintest);}
.pane-head .switch{margin-left:auto;display:flex;align-items:center;gap:3px;}
.pane-head .switch button{border:0;background:none;cursor:pointer;color:var(--faintest);font-size:10.5px;letter-spacing:.03em;font-weight:450;padding:5px 11px;border-radius:var(--r-sm);transition:color var(--slow) var(--ease),background var(--slow) var(--ease);}
.pane-head .switch button:hover{color:var(--muted);}
.pane-head .switch button.on{color:var(--ink);background:var(--panel-3);}

/* ---------- RAW pane (what actually happened) ---------- */
.raw{flex:1 1 auto;overflow-y:auto;padding:20px 22px 40px;}
.raw .row{display:grid;grid-template-columns:52px 1fr;gap:12px;padding:8px 0;border-top:1px solid var(--line);}
.raw .row:first-child{border-top:0;}
.raw .ts{font-size:9.5px;color:var(--faintest);letter-spacing:.02em;padding-top:2px;}
.raw .body{min-width:0;}
.raw .k{font-size:8.5px;letter-spacing:.09em;text-transform:uppercase;font-weight:600;display:inline-block;margin-bottom:3px;}
.raw .k.you{color:var(--ink);}
.raw .k.claude{color:var(--gold);}
.raw .k.thought{color:var(--faintest);}
.raw .k.tool{color:#7fa0c0;}
.raw .k.result{color:var(--faint);}
.raw .k.hook{color:var(--sage);}
.raw .k.decision{color:var(--gold);}
.raw .k.system,.raw .k.meta{color:var(--faintest);}
.raw .tx{font-size:12.5px;color:var(--muted);white-space:pre-wrap;word-break:break-word;font-weight:300;}
.raw .row.you .tx{color:var(--ink);font-weight:400;}
.raw .row.claude .tx{color:var(--ink);font-weight:400;}
.raw .sub{font-size:11.5px;color:var(--faint);white-space:pre-wrap;word-break:break-word;font-weight:300;margin-top:2px;}
.raw .mono{font-variant-numeric:tabular-nums;}
.raw .fold{cursor:pointer;color:var(--faintest);font-size:11.5px;}
.raw .fold:hover{color:var(--muted);}
.raw .foldbody{display:none;margin-top:4px;}
.raw .foldbody.open{display:block;}
.raw .trunc{color:var(--faintest);font-size:10px;letter-spacing:.02em;}

/* ---------- IDEA pane (reuses calm system) ---------- */
.scene{position:absolute;inset:46px 0 0 0;display:none;opacity:0;transition:opacity var(--slow) var(--ease);}
.scene.on{display:block;opacity:1;animation:fadeIn var(--slow) var(--ease);}
.scene.split{display:none;}
.scene.split.on{display:grid;grid-template-columns:1fr 46%;}
.convo{min-width:0;height:100%;display:flex;flex-direction:column;background:var(--stage);}
.convo-head{height:44px;flex:0 0 auto;display:flex;align-items:center;gap:10px;padding:0 22px;border-bottom:1px solid var(--line);background:var(--panel);}
.convo-head .t{font-size:12px;color:var(--ink);font-weight:500;margin-right:auto;}
.convo-head .s{font-size:9.5px;letter-spacing:.02em;color:var(--faint);display:inline-flex;align-items:center;gap:6px;}
.convo-head .s.needs{color:var(--gold);}
.convo-head .s.ready{color:var(--sage);}
.convo-head .s .dot{width:5px;height:5px;border-radius:50%;background:currentColor;animation:breathe 4s var(--ease) infinite;}
.convo-head .s.ready .dot{animation:none;}
.stream{flex:1 1 auto;overflow-y:auto;padding:30px 30px 16px;}
.col{max-width:560px;margin:0 auto;display:flex;flex-direction:column;}
.by{font-size:9px;letter-spacing:.09em;color:var(--faintest);margin-bottom:9px;text-transform:uppercase;}
.by b{color:var(--faint);font-weight:600;}
.by .at{text-transform:none;letter-spacing:.01em;}
.you-said{color:var(--muted);font-size:13px;font-weight:300;}
.mark{display:flex;align-items:center;gap:12px;width:100%;border:0;background:none;cursor:pointer;padding:9px 0;color:var(--faintest);font-size:10px;letter-spacing:.03em;text-align:left;transition:color var(--slow) var(--ease);}
.mark:hover{color:var(--faint);}
.mark .rule{flex:1 1 auto;height:1px;background:var(--line);}
.mark .lbl{flex:0 0 auto;display:inline-flex;align-items:center;gap:7px;}
.mark .n{color:var(--faintest);}
.mark .tick{font-size:9px;}
.mark.live .tick{color:var(--gold);animation:breathe 4s var(--ease) infinite;}
.mark.done .tick{color:var(--sage);}
.reveal-wrap{display:grid;grid-template-rows:0fr;transition:grid-template-rows var(--slow) var(--ease);}
.reveal-wrap.open{grid-template-rows:1fr;}
.reveal-wrap>div{overflow:hidden;min-height:0;}
.reveal-in{opacity:0;filter:blur(7px);transform:translateY(5px);transition:opacity var(--slow) var(--ease),filter var(--slow) var(--ease),transform var(--slow) var(--ease);}
.reveal-wrap.open .reveal-in{opacity:1;filter:blur(0);transform:none;}
.parts{display:flex;flex-direction:column;margin-top:4px;}
.part{position:relative;padding:12px 0 12px 20px;border-top:1px solid var(--line);cursor:pointer;}
.part:first-child{border-top:0;}
.part::before{content:attr(data-n);position:absolute;left:0;top:14px;font-size:9px;color:var(--faintest);}
.part .p-lead{color:var(--ink);font-size:13px;transition:color var(--slow) var(--ease);display:flex;align-items:baseline;gap:9px;}
.part:hover .p-lead{color:#fff;}
.part.sel .p-lead{color:#fff;}
.part.sel::before{color:var(--gold);}
.part.answered::before{color:var(--sage);}
.part .p-lead .need{font-size:9px;letter-spacing:.05em;color:var(--gold);text-transform:uppercase;flex:0 0 auto;}
.part.answered .p-lead .need{color:var(--sage);}
.part .p-more{font-size:12px;color:var(--muted);font-weight:300;padding-top:8px;white-space:pre-wrap;}
.part .p-reply{display:inline-flex;align-items:center;gap:6px;margin-top:10px;font-size:9.5px;letter-spacing:.03em;color:var(--faintest);opacity:0;transition:opacity var(--slow) var(--ease),color var(--slow) var(--ease);cursor:pointer;}
.part:hover .p-reply,.part.sel .p-reply{opacity:1;}
.part .p-reply:hover{color:var(--muted);}
.choice-row{display:flex;gap:8px;flex-wrap:wrap;padding-top:12px;}
.choice{border:1px solid var(--line-2);background:var(--panel-2);color:var(--muted);border-radius:var(--r-sm);padding:8px 13px;font-size:12px;cursor:pointer;transition:border-color var(--slow) var(--ease),color var(--slow) var(--ease),background var(--slow) var(--ease);}
.choice:hover{border-color:var(--line-3);color:var(--ink);}
.choice.picked{border-color:transparent;background:var(--sage);color:#0e1510;font-weight:500;}
.compose{flex:0 0 auto;padding:12px 30px 18px;}
.compose-inner{max-width:560px;margin:0 auto;}
.compose-ctx{font-size:9.5px;letter-spacing:.04em;color:var(--faintest);min-height:16px;margin-bottom:7px;transition:color var(--slow) var(--ease);}
.compose-ctx b{color:var(--faint);font-weight:600;}
.box{border:1px solid var(--line-2);border-radius:var(--r);background:var(--panel-2);transition:border-color var(--slow) var(--ease);}
.box:focus-within{border-color:var(--line-3);}
.box textarea{display:block;width:100%;background:none;border:0;resize:none;padding:11px 13px 3px;font-size:13px;font-weight:300;height:42px;}
.box textarea::placeholder{color:var(--faintest);}
.box-foot{display:flex;align-items:center;justify-content:space-between;padding:2px 9px 8px 13px;}
.box-foot .h{font-size:9px;letter-spacing:.03em;color:var(--faintest);}
.send{width:26px;height:26px;border-radius:var(--r-sm);border:0;background:var(--gold);color:#161206;cursor:pointer;font-size:12px;font-weight:600;transition:filter var(--slow) var(--ease);}
.send:hover{filter:brightness(1.12);}
.studio{position:absolute;top:44px;right:0;bottom:0;width:56%;background:var(--panel-2);border-left:1px solid var(--line-2);box-shadow:-30px 0 60px rgba(0,0,0,.3);transform:translateX(100%);transition:transform var(--slow) var(--ease);z-index:5;display:flex;flex-direction:column;}
.studio.open{transform:none;}
.studio.dock{position:static;width:auto;transform:none;box-shadow:none;border-left:1px solid var(--line);top:0;}
.studio-head{height:44px;flex:0 0 auto;display:flex;align-items:center;gap:14px;padding:0 18px;border-bottom:1px solid var(--line);}
.studio-head .title{font-size:10px;letter-spacing:.08em;color:var(--faint);text-transform:uppercase;}
.studio-head .x{margin-left:auto;border:0;background:none;cursor:pointer;color:var(--faintest);font-size:15px;padding:4px;transition:color var(--slow) var(--ease);}
.studio-head .x:hover{color:var(--ink);}
.lens{display:flex;gap:13px;}
.lens button{border:0;background:none;cursor:pointer;font-size:10px;color:var(--faintest);padding:2px 0;position:relative;transition:color var(--slow) var(--ease);}
.lens button:hover{color:var(--faint);}
.lens button.on{color:var(--ink);}
.lens button.on::after{content:'';position:absolute;left:0;right:0;bottom:-15px;height:1.5px;background:var(--ink);}
.studio-body{flex:1 1 auto;overflow-y:auto;padding:20px 18px;}
.pane-io{display:none;animation:fadeIn var(--slow) var(--ease);}
.pane-io.on{display:block;}
.pane-io h4{font-size:9px;letter-spacing:.13em;color:var(--faintest);font-weight:500;margin-bottom:14px;text-transform:uppercase;}
.item{border-top:1px solid var(--line);padding:11px 0;}
.item:first-of-type{border-top:0;}
.item .i-head{display:flex;align-items:baseline;gap:10px;}
.item .i-name{font-size:11px;color:var(--ink);font-weight:500;}
.item .i-meta{margin-left:auto;font-size:9.5px;color:var(--faintest);}
.item .i-sub{font-size:11.5px;color:var(--faint);font-weight:300;margin-top:3px;white-space:pre-wrap;word-break:break-word;}
.item .i-tick{color:var(--sage);}
.chan{font-size:10px;color:var(--faint);margin:2px 0 14px;}
.chan span{color:var(--faintest);}
.chan .live-dot{display:inline-block;width:5px;height:5px;border-radius:50%;background:var(--gold);animation:breathe 4s var(--ease) infinite;margin-right:6px;vertical-align:middle;}
.trace{display:flex;flex-direction:column;gap:15px;}
.trace .t-by{font-size:9px;letter-spacing:.06em;color:var(--faintest);margin-bottom:6px;display:flex;align-items:center;gap:7px;text-transform:uppercase;}
.trace .t-by .dot{width:4px;height:4px;border-radius:50%;background:var(--faintest);}
.trace .t-by.live .dot{background:var(--gold);animation:breathe 4s var(--ease) infinite;}
.trace .t-by b{color:var(--faint);font-weight:600;}
.trace .t-by .at{text-transform:none;margin-left:auto;}
.trace .t-say{font-size:12px;color:var(--muted);font-weight:300;padding-left:14px;border-left:1px solid var(--line-2);white-space:pre-wrap;}
.empty{font-size:11.5px;color:var(--faintest);font-weight:300;font-style:normal;padding:6px 0;}
.lanes{display:flex;flex-direction:column;}
.lane{border-top:1px solid var(--line);}
.lane:first-child{border-top:0;}
.lane-head{display:flex;align-items:center;gap:12px;width:100%;border:0;background:none;cursor:pointer;padding:14px 0;color:var(--muted);text-align:left;transition:color var(--slow) var(--ease);}
.lane-head:hover{color:var(--ink);}
.lane-head .l-name{font-size:10.5px;letter-spacing:.04em;text-transform:uppercase;font-weight:500;}
.lane-head .l-n{margin-left:auto;font-size:9.5px;color:var(--faintest);}
.lane-head .l-live{width:5px;height:5px;border-radius:50%;background:var(--gold);animation:breathe 4s var(--ease) infinite;}
.lane-head .chev{color:var(--faintest);font-size:10px;transition:transform var(--slow) var(--ease);}
.lane-head[aria-expanded="true"] .chev{transform:rotate(90deg);}
.lane.pulse{background:linear-gradient(90deg,rgba(208,161,75,.05),transparent 60%);}
.lane-body{display:grid;grid-template-rows:0fr;transition:grid-template-rows var(--slow) var(--ease);}
.lane-body.open{grid-template-rows:1fr;}
.lane-body>div{overflow:hidden;min-height:0;}
.lane-rows{padding:0 0 14px;display:flex;flex-direction:column;gap:9px;}
.lane-row{display:flex;align-items:baseline;gap:10px;font-size:11.5px;color:var(--faint);font-weight:300;}
.lane-row .lr-k{font-size:10.5px;color:var(--muted);font-weight:500;flex:0 0 auto;}
.lane-row .lr-m{margin-left:auto;font-size:9px;color:var(--faintest);flex:0 0 auto;}
.hint-foot{flex:0 0 auto;padding:11px 18px 14px;border-top:1px solid var(--line);font-size:9px;letter-spacing:.02em;color:var(--faintest);line-height:1.7;}
@media (prefers-reduced-motion:reduce){*{animation-duration:.001ms !important;transition-duration:.001ms !important;}}
</style>

  root.querySelectorAll('.part').forEach(p=>{
    p.querySelector('.p-lead').addEventListener('click',e=>{e.stopPropagation();p.querySelector('.reveal-wrap').classList.toggle('open');});
    const reply=p.querySelector('.p-reply');
    if(reply) reply.addEventListener('click',e=>{e.stopPropagation();root.querySelectorAll('.part').forEach(o=>o.classList.remove('sel'));p.classList.add('sel');ctx.innerHTML='Answering <b>Part '+p.dataset.part+'</b> · '+esc(p.querySelector('.p-lead-t').textContent);});
  });
  wireDecisions(root);
}

/* ---------------- BACKSTAGE ---------------- */
function renderBackstage(root){
  const L=DATA.lenses;
  const laneRows=rows=>rows.length?rows.map(r=>`<div class="lane-row"><span class="lr-k">${esc(r.k)}</span>${esc(r.v)}<span class="lr-m">${esc(r.m)}</span></div>`).join(''):`<div class="empty">Nothing here.</div>`;
  const ctxRows=L.context.items.map(i=>({k:i.name,v:i.sub||'',m:i.meta}));
  const hookRows=L.hooks.items.map(i=>({k:i.name,v:i.sub||'',m:i.tick?'✓':i.meta}));
  const subRows=(L.subagents&&L.subagents.trace||[]).map(t=>({k:t.by+(t.to?' → '+t.to:''),v:t.say,m:t.at||''}));
  const tunRows=(L.tunnel&&L.tunnel.items||[]).flatMap(t=>t.trace.map(x=>({k:t.channel,v:x.say,m:t.kind})));
  root.innerHTML=`
  <div class="convo">${convoHead()}
    <div class="stream"><div class="col">${youBlock()}
      <div><div class="by"><b>Claude</b> · <span class="at">${esc(DATA.reply.at)}</span></div>
        <button class="said" data-msg="b1" style="border:0;background:none;text-align:left;cursor:pointer;color:var(--ink);font-size:13.5px;padding:0">${esc(DATA.reply.caption)}</button>
        <div class="reveal-wrap" id="b1"><div><div class="reveal-in" style="padding-top:12px;color:var(--muted);font-weight:300;font-size:12.5px;line-height:1.7;white-space:pre-wrap">${esc(DATA.reply.full)}</div></div></div>
      </div>
      <div style="margin-top:34px;font-size:9.5px;letter-spacing:.03em;color:var(--faintest)">The conversation stays clean. Everything the agent did sits backstage — click the message to light the lanes.</div>
    </div></div>
    <div class="compose"><div class="compose-inner"><div class="compose-ctx">To Claude</div><div class="box"><textarea placeholder="Reply to Claude…"></textarea><div class="box-foot"><span class="h">Return to send</span><button class="send">↑</button></div></div></div></div>
  </div>
  <aside class="studio dock"><div class="studio-head"><span class="title">Backstage</span></div>
    <div class="studio-body"><div class="lanes">
      <div class="lane"><button class="lane-head" aria-expanded="false"><span class="l-name">Context</span><span class="l-n">${L.context.count} loaded</span><span class="chev">›</span></button><div class="lane-body"><div><div class="lane-rows">${laneRows(ctxRows)}</div></div></div></div>
      <div class="lane"><button class="lane-head" aria-expanded="false"><span class="l-name">Hooks</span><span class="l-n">${L.hooks.count} run</span><span class="chev">›</span></button><div class="lane-body"><div><div class="lane-rows">${laneRows(hookRows)}</div></div></div></div>
      <div class="lane"><button class="lane-head" aria-expanded="false">${(L.subagents&&L.subagents.live)?'<span class="l-live"></span>':''}<span class="l-name">Subagents</span><span class="l-n">${subRows.length?('Explore · '+((L.subagents&&L.subagents.done)?'done':'live')):'none'}</span><span class="chev">›</span></button><div class="lane-body"><div><div class="lane-rows">${laneRows(subRows)}</div></div></div></div>
      <div class="lane"><button class="lane-head" aria-expanded="false"><span class="l-name">Tunnel</span><span class="l-n">${tunRows.length?tunRows.length+' msg':'none'}</span><span class="chev">›</span></button><div class="lane-body"><div><div class="lane-rows">${laneRows(tunRows)}</div></div></div></div>
    </div></div>
    <div class="hint-foot">Front stage = what Claude said to you. Backstage = context, hooks, subagents, agent chatter — click a message to light the lanes.</div>
  </aside>`;
  root.querySelectorAll('.lane-head').forEach(h=>h.addEventListener('click',()=>{const open=h.nextElementSibling.classList.toggle('open');h.setAttribute('aria-expanded',String(open));}));
  root.querySelectorAll('[data-msg]').forEach(btn=>btn.addEventListener('click',()=>{root.querySelector('#'+btn.dataset.msg).classList.toggle('open');root.querySelectorAll('.lane').forEach((l,i)=>setTimeout(()=>{l.classList.add('pulse');setTimeout(()=>l.classList.remove('pulse'),1400);},i*160));}));
}

/* ---------------- FACETS ---------------- */
function renderFacets(root){
  const facetHtml=p=>`<div class="part" data-n="${p.n}" data-prov="${p.prov}"${p.decision!=null?` data-di="${p.decision}"`:''}><div class="p-lead"><span class="p-lead-t">${esc(p.lead)}</span>${p.need?'<span class="need">Needs you</span>':''}</div><div class="reveal-wrap"><div><div class="reveal-in"><div class="p-more">${esc(p.more)}</div>${p.decision!=null?choiceRow(p.decision):'<span class="p-reply">↳ RespondToThis · Inspect</span>'}</div></div></div></div>`;
  const provPane=(k,pv)=>`<div class="pane-io" data-prov="${k}"><h4>${esc(pv.title)}</h4>${pv.items.map(itemHtml).join('')}</div>`;
  root.innerHTML=`
  <div class="convo">${convoHead()}
    <div class="stream"><div class="col">${youBlock()}
      <div class="by"><b>Claude</b> · <span class="at">${esc(DATA.reply.at)}</span></div>
      <div class="parts">${DATA.reply.parts.map(facetHtml).join('')}</div>
      <div style="margin-top:34px;font-size:9.5px;letter-spacing:.03em;color:var(--faintest)">Every line is its own facet. Click one to open it — read more, see where it came from, answer just that.</div>
    </div></div>
    <div class="compose"><div class="compose-inner"><div class="compose-ctx" id="f-ctx">To Claude</div><div class="box"><textarea id="f-ta" placeholder="Click a facet to answer it directly…"></textarea><div class="box-foot"><span class="h">Return to send</span><button class="send">↑</button></div></div></div></div>
  </div>
  <aside class="studio" id="f-studio"><div class="studio-head"><span class="title" id="f-title">Provenance</span><button class="x" id="f-x">✕</button></div>
    <div class="studio-body">${Object.entries(DATA.prov).map(([k,v])=>provPane(k,v)).join('')}</div>
    <div class="hint-foot">This facet's provenance — the context, edits, hooks, subagents and agent chats behind exactly this line.</div>
  </aside>`;
  const studio=root.querySelector('#f-studio'),title=root.querySelector('#f-title');
  const panes=[...root.querySelectorAll('#f-studio .pane-io')],ctx=root.querySelector('#f-ctx'),ta=root.querySelector('#f-ta');
  root.querySelectorAll('.part').forEach(p=>{
    p.querySelector('.p-lead').addEventListener('click',()=>{
      const wasSel=p.classList.contains('sel');
      root.querySelectorAll('.part').forEach(o=>{o.classList.remove('sel');o.querySelector('.reveal-wrap').classList.remove('open');});
      if(wasSel){studio.classList.remove('open');ctx.textContent='To Claude';return;}
      p.classList.add('sel');p.querySelector('.reveal-wrap').classList.add('open');studio.classList.add('open');
      panes.forEach(pa=>pa.classList.toggle('on',pa.dataset.prov===p.dataset.prov));
      title.textContent='Facet '+p.dataset.n;ctx.innerHTML='Answering <b>Facet '+p.dataset.n+'</b>';
      ta.setAttribute('placeholder','Answer “'+p.querySelector('.p-lead-t').textContent+'”');
    });
  });
  root.querySelector('#f-x').addEventListener('click',()=>{studio.classList.remove('open');root.querySelectorAll('.part').forEach(o=>{o.classList.remove('sel');o.querySelector('.reveal-wrap').classList.remove('open');});ctx.textContent='To Claude';});
  wireDecisions(root);
}

renderStream(document.querySelector('.scene[data-scene="stream"]'));
renderBackstage(document.querySelector('.scene[data-scene="backstage"]'));
renderFacets(document.querySelector('.scene[data-scene="facets"]'));
const sceneBtns=[...document.querySelectorAll('.pane-head .switch button')];
const scenes=[...document.querySelectorAll('.scene')];
sceneBtns.forEach(b=>b.addEventListener('click',()=>{sceneBtns.forEach(x=>x.classList.toggle('on',x===b));scenes.forEach(s=>s.classList.toggle('on',s.dataset.scene===b.dataset.scene));}));
</script>
</body>
</html>
