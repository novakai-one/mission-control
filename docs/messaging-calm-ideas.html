<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Novakai — Calm Messaging · Three Ideas (real transcript)</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;450;500;600&display=swap');

/* ------------------------------------------------------------------ brand
   Novakai Command. Near-black, never pure #000. Colour held in reserve:
   gold #d0a14b only for Live / Needs-you, sage #78a886 only for Done.
   Everything else is greyscale, space, and type weight.
   Calm = 700ms, reveal-on-click. One typeface: Inter, all roles.         */
:root {
  --stage:#0a0a0c;   --panel:#0d0d0f;  --panel-2:#111114;
  --panel-3:#16161a; --panel-4:#1c1c21;

  --ink:#ececee;     --muted:#a2a2aa;  --faint:#8b8b94;  --faintest:#5f5f66;
  --line:rgba(236,236,238,.055);
  --line-2:rgba(236,236,238,.10);
  --line-3:rgba(236,236,238,.16);

  --gold:#d0a14b;    --sage:#78a886;
  --gold-soft:rgba(208,161,75,.5);

  --r:8px; --r-sm:6px; --r-xs:4px;      /* 8px is the ceiling */
  --sans:'Inter',-apple-system,system-ui,'Segoe UI',sans-serif;
  --mono:var(--sans);                    /* one typeface — Inter everywhere */
  --slow:700ms;
  --ease:cubic-bezier(.33,0,.16,1);
}

* { margin:0; padding:0; box-sizing:border-box; }
html,body { height:100%; }
body {
  background:var(--stage);
  color:var(--ink);
  font-family:var(--sans);
  font-size:13px;
  font-weight:400;
  line-height:1.6;
  letter-spacing:.002em;
  -webkit-font-smoothing:antialiased;
  text-rendering:optimizeLegibility;
  overflow:hidden;
}
button,textarea,input { font:inherit; color:inherit; }
::selection { background:rgba(236,236,238,.13); }
::-webkit-scrollbar { width:10px; height:10px; }
::-webkit-scrollbar-thumb { background:var(--panel-4); border-radius:6px; border:3px solid transparent; background-clip:padding-box; }
::-webkit-scrollbar-track { background:transparent; }
* { scrollbar-width:thin; scrollbar-color:var(--panel-4) transparent; }
:focus { outline:none; }
:focus-visible { outline:1.5px solid var(--line-3); outline-offset:2px; border-radius:3px; }

@keyframes breathe { 0%,100%{opacity:1} 50%{opacity:.35} }
@keyframes fadeIn { from{opacity:0} to{opacity:1} }

/* a "label" is Inter, small, wide-tracked — replaces what was mono before */
.lbl-face { font-size:10px; letter-spacing:.06em; }

/* ------------------------------------------------------------------ frame */
.frame { height:100%; display:grid; grid-template-rows:auto 1fr; padding:14px 16px 16px; gap:12px; }

.switch { display:flex; justify-content:center; align-items:center; gap:4px; }
.switch button {
  border:0; background:none; cursor:pointer;
  color:var(--faintest);
  font-size:11px; letter-spacing:.03em; font-weight:450;
  padding:6px 15px; border-radius:var(--r-sm);
  transition:color var(--slow) var(--ease), background var(--slow) var(--ease);
}
.switch button:hover { color:var(--muted); }
.switch button.on { color:var(--ink); background:var(--panel-3); }
.switch .sep { width:1px; height:12px; background:var(--line-2); margin:0 3px; }

/* ------------------------------------------------------------------ shell */
.app {
  min-height:0;
  display:grid; grid-template-columns:238px 1fr;
  background:var(--panel);
  border:1px solid var(--line);
  border-radius:12px;
  overflow:hidden;
  box-shadow:0 30px 80px rgba(0,0,0,.45), inset 0 1px 0 rgba(255,255,255,.02);
}

/* rail — the existing projects / threads panel, kept calm */
.rail { border-right:1px solid var(--line); display:flex; flex-direction:column; min-height:0; user-select:none; }
.brand { display:flex; align-items:center; gap:9px; padding:18px 20px 18px; font-size:13px; }
.brand .g { font-size:12px; font-weight:600; color:var(--gold); letter-spacing:.02em; }
.brand b { font-weight:600; letter-spacing:-.005em; }
.brand b span { color:var(--faintest); font-weight:400; }
.group { font-size:9px; letter-spacing:.15em; color:var(--faintest); padding:16px 20px 8px; font-weight:500; }
.thread { display:flex; align-items:center; gap:11px; padding:7px 20px 7px 18px; color:var(--muted); cursor:default; position:relative; transition:color var(--slow) var(--ease), opacity var(--slow) var(--ease); }
.thread:hover { color:var(--ink); }
.thread .dot { width:5px; height:5px; border-radius:50%; background:var(--faintest); flex:0 0 auto; }
.thread.live .dot { background:var(--gold); animation:breathe 4s var(--ease) infinite; }
.thread .nm { flex:1 1 auto; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.thread .nm small { display:block; font-size:9px; color:var(--faintest); letter-spacing:.01em; }
.thread.here { color:var(--ink); }
.thread.here::before { content:''; position:absolute; left:0; top:8px; bottom:8px; width:2px; border-radius:1px; background:var(--line-3); }
.thread.rest { opacity:.4; }
.thread.rest:hover { opacity:.85; }

/* ------------------------------------------------------------------ area + scenes */
.area { position:relative; min-width:0; min-height:0; overflow:hidden; }
.scene { position:absolute; inset:0; display:none; opacity:0; transition:opacity var(--slow) var(--ease); }
.scene.on { display:block; opacity:1; animation:fadeIn var(--slow) var(--ease); }
.scene.split { display:none; }
.scene.split.on { display:grid; grid-template-columns:1fr 42%; }

/* conversation column (shared) */
.convo { min-width:0; height:100%; display:flex; flex-direction:column; background:var(--stage); }
.convo-head { height:48px; flex:0 0 auto; display:flex; align-items:center; gap:10px; padding:0 26px; border-bottom:1px solid var(--line); background:var(--panel); user-select:none; }
.convo-head .t { font-size:12.5px; color:var(--ink); font-weight:500; margin-right:auto; }
.convo-head .s { font-size:10px; letter-spacing:.02em; color:var(--faint); display:inline-flex; align-items:center; gap:6px; }
.convo-head .s.needs { color:var(--gold); }
.convo-head .s.ready { color:var(--sage); }
.convo-head .s .dot { width:5px; height:5px; border-radius:50%; background:currentColor; animation:breathe 4s var(--ease) infinite; }
.convo-head .s.ready .dot { animation:none; }
.stream { flex:1 1 auto; overflow-y:auto; padding:40px 40px 20px; }
.col { max-width:600px; margin:0 auto; display:flex; flex-direction:column; }

.by { font-size:9px; letter-spacing:.09em; color:var(--faintest); margin-bottom:9px; text-transform:uppercase; }
.by b { color:var(--faint); font-weight:600; }
.by .at { text-transform:none; letter-spacing:.01em; }
.you-said { color:var(--muted); font-size:13px; font-weight:300; }
.said { color:var(--ink); font-size:14px; font-weight:400; }

/* a machinery marker — a hairline you click to reveal; no pills, no boxes */
.mark { display:flex; align-items:center; gap:12px; width:100%; border:0; background:none; cursor:pointer; padding:9px 0; color:var(--faintest); font-size:10px; letter-spacing:.03em; text-align:left; transition:color var(--slow) var(--ease); }
.mark:hover { color:var(--faint); }
.mark .rule { flex:1 1 auto; height:1px; background:var(--line); }
.mark .lbl { flex:0 0 auto; display:inline-flex; align-items:center; gap:7px; }
.mark .n { color:var(--faintest); }
.mark .tick { font-size:9px; }
.mark.live .tick { color:var(--gold); animation:breathe 4s var(--ease) infinite; }
.mark.done .tick { color:var(--sage); }

/* revealable text — slow unblur */
.reveal-wrap { display:grid; grid-template-rows:0fr; transition:grid-template-rows var(--slow) var(--ease); }
.reveal-wrap.open { grid-template-rows:1fr; }
.reveal-wrap > div { overflow:hidden; min-height:0; }
.reveal-in { opacity:0; filter:blur(7px); transform:translateY(5px); transition:opacity var(--slow) var(--ease), filter var(--slow) var(--ease), transform var(--slow) var(--ease); }
.reveal-wrap.open .reveal-in { opacity:1; filter:blur(0); transform:none; }

/* parts — addressable pieces of one reply */
.parts { display:flex; flex-direction:column; margin-top:4px; }
.part { position:relative; padding:12px 0 12px 20px; border-top:1px solid var(--line); cursor:pointer; }
.part:first-child { border-top:0; }
.part::before { content:attr(data-n); position:absolute; left:0; top:14px; font-size:9px; color:var(--faintest); letter-spacing:.02em; }
.part .p-lead { color:var(--ink); font-size:13.5px; transition:color var(--slow) var(--ease); display:flex; align-items:baseline; gap:9px; }
.part:hover .p-lead { color:#fff; }
.part.sel .p-lead { color:#fff; }
.part.sel::before { color:var(--gold); }
.part.answered::before { color:var(--sage); }
.part .p-lead .need { font-size:9px; letter-spacing:.05em; color:var(--gold); text-transform:uppercase; }
.part.answered .p-lead .need { color:var(--sage); }
.part .p-more { font-size:12.5px; color:var(--muted); font-weight:300; padding-top:8px; }
.part .p-reply { display:inline-flex; align-items:center; gap:6px; margin-top:10px; font-size:9.5px; letter-spacing:.03em; color:var(--faintest); opacity:0; transition:opacity var(--slow) var(--ease), color var(--slow) var(--ease); cursor:pointer; }
.part:hover .p-reply, .part.sel .p-reply { opacity:1; }
.part .p-reply:hover { color:var(--muted); }

/* inline decision — tap choices, answer without typing (releases gold) */
.choice-row { display:flex; gap:8px; flex-wrap:wrap; padding-top:12px; }
.choice { border:1px solid var(--line-2); background:var(--panel-2); color:var(--muted); border-radius:var(--r-sm); padding:8px 13px; font-size:12px; cursor:pointer; transition:border-color var(--slow) var(--ease), color var(--slow) var(--ease), background var(--slow) var(--ease); }
.choice:hover { border-color:var(--line-3); color:var(--ink); }
.choice.picked { border-color:transparent; background:var(--sage); color:#0e1510; font-weight:500; }

/* composer (shared) */
.compose { flex:0 0 auto; padding:14px 40px 22px; }
.compose-inner { max-width:600px; margin:0 auto; }
.compose-ctx { font-size:9.5px; letter-spacing:.04em; color:var(--faintest); min-height:16px; margin-bottom:7px; transition:color var(--slow) var(--ease); }
.compose-ctx b { color:var(--faint); font-weight:600; }
.box { border:1px solid var(--line-2); border-radius:var(--r); background:var(--panel-2); transition:border-color var(--slow) var(--ease); }
.box:focus-within { border-color:var(--line-3); }
.box textarea { display:block; width:100%; background:none; border:0; resize:none; padding:12px 14px 4px; font-size:13px; font-weight:300; height:46px; }
.box textarea::placeholder { color:var(--faintest); }
.box-foot { display:flex; align-items:center; justify-content:space-between; padding:2px 10px 9px 14px; }
.box-foot .h { font-size:9px; letter-spacing:.03em; color:var(--faintest); }
.send { width:26px; height:26px; border-radius:var(--r-sm); border:0; background:var(--gold); color:#161206; cursor:pointer; font-size:12px; font-weight:600; transition:filter var(--slow) var(--ease); }
.send:hover { filter:brightness(1.12); }

/* ------------------------------------------------------------------ studio
   The inspection overlay — 42% of the area. Slides in over the conversation
   in Stream / Facets; sits persistent in Backstage.                        */
.studio { position:absolute; top:0; right:0; bottom:0; width:42%; background:var(--panel-2); border-left:1px solid var(--line-2); box-shadow:-30px 0 60px rgba(0,0,0,.3); transform:translateX(100%); transition:transform var(--slow) var(--ease); z-index:5; display:flex; flex-direction:column; }
.studio.open { transform:none; }
.studio.dock { position:static; width:auto; transform:none; box-shadow:none; border-left:1px solid var(--line); }
.studio-head { height:48px; flex:0 0 auto; display:flex; align-items:center; gap:16px; padding:0 20px; border-bottom:1px solid var(--line); user-select:none; }
.studio-head .title { font-size:10px; letter-spacing:.08em; color:var(--faint); text-transform:uppercase; }
.studio-head .x { margin-left:auto; border:0; background:none; cursor:pointer; color:var(--faintest); font-size:15px; padding:4px; transition:color var(--slow) var(--ease); }
.studio-head .x:hover { color:var(--ink); }
.lens { display:flex; gap:14px; }
.lens button { border:0; background:none; cursor:pointer; font-size:10px; letter-spacing:.02em; color:var(--faintest); padding:2px 0; position:relative; transition:color var(--slow) var(--ease); }
.lens button:hover { color:var(--faint); }
.lens button.on { color:var(--ink); }
.lens button.on::after { content:''; position:absolute; left:0; right:0; bottom:-16px; height:1.5px; background:var(--ink); }
.studio-body { flex:1 1 auto; overflow-y:auto; padding:22px 20px; }

/* studio panes */
.pane { display:none; animation:fadeIn var(--slow) var(--ease); }
.pane.on { display:block; }
.pane h4 { font-size:9px; letter-spacing:.13em; color:var(--faintest); font-weight:500; margin-bottom:14px; text-transform:uppercase; }

.item { border-top:1px solid var(--line); padding:11px 0; }
.item:first-of-type { border-top:0; }
.item .i-head { display:flex; align-items:baseline; gap:10px; }
.item .i-name { font-size:11px; color:var(--ink); font-weight:500; letter-spacing:.005em; }
.item .i-meta { margin-left:auto; font-size:9.5px; letter-spacing:.02em; color:var(--faintest); }
.item .i-sub { font-size:12px; color:var(--faint); font-weight:300; margin-top:3px; }
.item .i-tick { color:var(--sage); font-size:9.5px; }

/* nested agent transcript (subagents / tunnel) */
.chan { font-size:10px; letter-spacing:.02em; color:var(--faint); margin:2px 0 14px; }
.chan span { color:var(--faintest); }
.chan .live-dot { display:inline-block; width:5px; height:5px; border-radius:50%; background:var(--gold); animation:breathe 4s var(--ease) infinite; margin-right:6px; vertical-align:middle; }
.trace { display:flex; flex-direction:column; gap:16px; }
.trace .t-by { font-size:9px; letter-spacing:.06em; color:var(--faintest); margin-bottom:6px; display:flex; align-items:center; gap:7px; text-transform:uppercase; }
.trace .t-by .dot { width:4px; height:4px; border-radius:50%; background:var(--faintest); }
.trace .t-by.live .dot { background:var(--gold); animation:breathe 4s var(--ease) infinite; }
.trace .t-by b { color:var(--faint); font-weight:600; }
.trace .t-by .at { text-transform:none; letter-spacing:.01em; margin-left:auto; }
.trace .t-say { font-size:12.5px; color:var(--muted); font-weight:300; padding-left:14px; border-left:1px solid var(--line-2); }

/* backstage lanes */
.lanes { display:flex; flex-direction:column; }
.lane { border-top:1px solid var(--line); }
.lane:first-child { border-top:0; }
.lane-head { display:flex; align-items:center; gap:12px; width:100%; border:0; background:none; cursor:pointer; padding:15px 0; color:var(--muted); text-align:left; transition:color var(--slow) var(--ease); }
.lane-head:hover { color:var(--ink); }
.lane-head .l-name { font-size:10.5px; letter-spacing:.04em; text-transform:uppercase; font-weight:500; }
.lane-head .l-n { margin-left:auto; font-size:9.5px; letter-spacing:.02em; color:var(--faintest); }
.lane-head .l-live { width:5px; height:5px; border-radius:50%; background:var(--gold); animation:breathe 4s var(--ease) infinite; }
.lane-head .chev { color:var(--faintest); font-size:10px; transition:transform var(--slow) var(--ease); }
.lane-head[aria-expanded="true"] .chev { transform:rotate(90deg); }
.lane.pulse { background:linear-gradient(90deg, rgba(208,161,75,.05), transparent 60%); }
.lane-body { display:grid; grid-template-rows:0fr; transition:grid-template-rows var(--slow) var(--ease); }
.lane-body.open { grid-template-rows:1fr; }
.lane-body > div { overflow:hidden; min-height:0; }
.lane-rows { padding:0 0 14px; display:flex; flex-direction:column; gap:9px; }
.lane-row { display:flex; align-items:baseline; gap:10px; font-size:12px; color:var(--faint); font-weight:300; }
.lane-row .lr-k { font-size:10.5px; letter-spacing:.01em; color:var(--muted); font-weight:500; flex:0 0 auto; }
.lane-row .lr-m { margin-left:auto; font-size:9px; letter-spacing:.02em; color:var(--faintest); flex:0 0 auto; }

.hint-foot { flex:0 0 auto; padding:12px 20px 16px; border-top:1px solid var(--line); font-size:9px; letter-spacing:.02em; color:var(--faintest); line-height:1.7; }

@media (prefers-reduced-motion:reduce) { * { animation-duration:.001ms !important; transition-duration:.001ms !important; } }
</style>
</head>
<body>
<div class="frame">

  <nav class="switch">
    <button class="on" data-scene="stream">Stream</button><span class="sep"></span>
    <button data-scene="backstage">Backstage</button><span class="sep"></span>
    <button data-scene="facets">Facets</button>
  </nav>

  <div class="app">

    <!-- rail (kept) — threads are real sessions in this project -->
    <aside class="rail">
      <div class="brand"><span class="g">&gt;_</span><b>Novakai<span>&nbsp;Command</span></b></div>
      <div class="group">PROJECTS</div>
      <div class="thread here"><span class="dot"></span><span class="nm">Novakai Command<small>~/Programming/Novakai-Command</small></span></div>
      <div class="group">THREADS</div>
      <div class="thread live here"><span class="dot"></span><span class="nm">Files Tab · Deselect</span></div>
      <div class="thread"><span class="dot"></span><span class="nm">Repo Cleanup · PR #29</span></div>
      <div class="thread rest"><span class="dot"></span><span class="nm">Renderer Registry</span></div>
      <div class="thread rest"><span class="dot"></span><span class="nm">Parser String Contracts</span></div>
    </aside>

    <section class="area" id="area">
      <!-- scenes are rendered from DATA by script -->
      <div class="scene on" data-scene="stream"></div>
      <div class="scene split" data-scene="backstage"></div>
      <div class="scene" data-scene="facets"></div>
    </section>
  </div>
</div>

<script>
/* ==================================================================
   REAL TRANSCRIPT DATA
   Loaded from session cac69dfe (Files-tab deselect, 2026-07-12),
   with the agent-to-agent DM from session e97b567a.

   EVENT-TYPE ROUTING — every type in the transcript has a home:

   MAIN STREAM (what you read, centre)
     user (prompt) .............. You turn
     assistant text ............. Claude reply, split into addressable parts
     AskUserQuestion ............ a decision part — the ONE gold "needs you"
     system compact_boundary .... a "compacted" divider  (none in window)
     system away_summary ........ a "while you were away" card
     pr-link .................... a shipped-PR artifact

   STUDIO / LENSES (inspect, to the side)
     Read + file/edited_text_file + skill_listing/invoked_skills
        + *_delta (mcp/agent/tools) + memory ... Context lens
     hook_success + hook_additional_context
        + command_permissions .................. Hooks lens
     Edit / Write / Bash ....................... Context lens (what changed / ran)
     Agent (subagent) + its result ............. Subagents lens (live + history)
     SendMessage ............................... Tunnel lens (DM / group)
     assistant thinking ........................ dim "Thought" in provenance
     TaskCreate/TaskUpdate + task_reminder ..... Tasks (surfaces on the decision)

   AMBIENT / META (header, rail, composer, footer — never in the reading flow)
     ai-title ......... thread title (rail + header)
     mode/permission-mode ... mode indicator (header)
     turn_duration .... timing on a turn (dim)
     queue-operation/queued_command ... your queued messages (composer)
     plan_mode/plan_mode_exit ... plan-mode banner
     file-history-snapshot ... undo checkpoints (hidden, restore affordance)
     last-prompt / date_change / scheduled_task_fire / model_refusal_fallback
        ... session meta (dividers / resumed / error states)
   ================================================================== */
const DATA = {
  thread: { title:'Files Tab · Deselect', path:'~/Programming/Novakai-Command', branch:'feat/files-redesign' },
  status: 'needs',                       // needs | ready — drives the one gold signal
  you: { at:'20:47', text:'In the Files tab I need a way to deselect. When I click a file it highlights with a grey box — I expect to press Escape or click off and have it unselect.' },
  reply: {
    at:'21:05',
    caption:'I understand the code. Two calls are yours.',
    parts: [
      { n:'01', lead:'The selection lives in three files.',
        more:'files/index.tsx holds the selected-file state, tree/index.tsx paints the grey box, and detail/index.css owns the empty area you would click off into. No Escape handler exists yet.',
        prov:'p1' },
      { n:'02', lead:'Deselect scope is your call.', need:true,
        more:'Escape-to-deselect is in either way. The open question is what a click counts as: any empty area, or only the empty file-list area.',
        decision:0, prov:'p2' },
      { n:'03', lead:'The branch is your call too.', need:true,
        more:'The remote branch was deleted on GitHub. I can open a new branch bundling everything, or a fresh branch carrying just the deselect note.',
        decision:1, prov:'p3' },
    ]
  },
  decisions: [
    { header:'Deselect scope', opts:['Any empty area','Empty file-list only'] },
    { header:'Branch', opts:['New branch, bundle all','Fresh branch, note only'] },
  ],
  lenses: {
    context: { count:6, items:[
      { name:'files/index.tsx',  meta:'read', sub:'Holds the selected-file state.' },
      { name:'tree/index.tsx',   meta:'read', sub:'Paints the grey selection box.' },
      { name:'detail/index.css', meta:'read', sub:'The click-off surface below the header.' },
      { name:'tree/index.css · files/index.css', meta:'read', sub:'Layout — where the empty space is.' },
      { name:'browse.mjs',       meta:'read', sub:'The harness the subagent verified with.' },
      { name:'4 skills · listing', meta:'loaded', sub:'frontend-design, superpowers, verify.' },
    ]},
    hooks: { count:3, items:[
      { name:'SessionStart · startup', meta:'ok', tick:true, sub:'Superpowers + MCP + browser instructions injected.' },
      { name:'UserPromptSubmit',       meta:'', tick:true, sub:'Verify-in-browser standing reminder added.' },
      { name:'PreToolUse · Bash',      meta:'allow', tick:true, sub:'git / npx tsc — matched the allowlist.' },
    ]},
    subagents: {
      channel:'Explore · general-purpose', live:false, done:true,
      meta:'21.7k tokens · 13 tools · 1m 53s',
      trace:[
        { by:'You', to:'Explore', at:'20:48', say:'Find where a file row gets selected and the grey box is set. Is there any Escape handling?' },
        { by:'Explore', to:'Claude', at:'20:50', say:'Selection state is in files/index.tsx; the grey box is a class in tree/index.tsx. No Escape handler anywhere.' },
        { by:'Explore', to:'Claude', at:'20:50', say:'All three behaviours verified in the browser. Here are the results.' },
      ]
    },
    tunnel: { items:[
      { channel:'DM · Fable session 2fdb0668', kind:'dm', at:'Jul 17',
        trace:[
          { by:'Fable', to:'this thread', at:'', say:'Coordinating repo cleanup after PR #29. I merged the codex-launch fix and I am cleaning up branches and worktrees — shout if you are mid-anything that needs feat/files-redesign.' },
        ] },
    ]}
  },
  // per-part provenance for Facets — which homes produced each line
  prov: {
    p1: { title:'Facet 01 · where it came from', items:[
      { name:'Context · 6 files', meta:'read', sub:'files/index.tsx, tree/index.tsx, detail/index.css …' },
      { name:'Subagent · Explore', meta:'done', tick:true, sub:'Located the selection state and grey-box class.' },
      { name:'Thought', meta:'reasoned', sub:'Mapped state → paint → click-off surface.' },
    ]},
    p2: { title:'Facet 02 · where it came from', items:[
      { name:'Subagent · Explore', meta:'done', tick:true, sub:'Confirmed there is no Escape handler to conflict.' },
      { name:'Decision · pending', meta:'you', sub:'Any empty area vs. empty file-list only.' },
      { name:'Hooks', meta:'—', sub:'None gated this line.' },
    ]},
    p3: { title:'Facet 03 · where it came from', items:[
      { name:'Bash · git', meta:'ran', sub:'feat/files-redesign exists locally; remote was deleted.' },
      { name:'Tunnel · Fable', meta:'waiting', sub:'Another agent is cleaning up branches — coordinated.' },
      { name:'Decision · pending', meta:'you', sub:'Bundle everything vs. deselect note only.' },
    ]},
  }
};

/* -------------------------------------------------- tiny render helpers */
const esc = s => String(s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const el = html => { const t = document.createElement('template'); t.innerHTML = html.trim(); return t.content.firstElementChild; };

function convoHead() {
  const s = DATA.status;
  const label = s === 'ready' ? 'Claude · Ready for you' : 'Claude · Needs you';
  return `<div class="convo-head"><span class="t">${esc(DATA.thread.title)}</span>
    <span class="s ${s==='ready'?'ready':'needs'}" data-status><span class="dot"></span>${label}</span></div>`;
}
function youBlock() {
  return `<div style="margin-bottom:34px"><div class="by"><b>You</b> · <span class="at">${DATA.you.at}</span></div>
    <div class="you-said">${esc(DATA.you.text)}</div></div>`;
}
function choiceRow(di) {
  const d = DATA.decisions[di];
  return `<div class="choice-row" data-decision="${di}">` +
    d.opts.map(o => `<button class="choice">${esc(o)}</button>`).join('') + `</div>`;
}

/* ---- context/hooks lens items ---- */
function itemHtml(it) {
  const meta = it.tick ? `<span class="i-meta i-tick">✓ ${esc(it.meta)}</span>` : `<span class="i-meta">${esc(it.meta)}</span>`;
  return `<div class="item"><div class="i-head"><span class="i-name">${esc(it.name)}</span>${meta}</div>
    <div class="i-sub">${esc(it.sub)}</div></div>`;
}
function traceHtml(trace) {
  return `<div class="trace">` + trace.map(t => {
    const to = t.to ? ` → ${esc(t.to)}` : '';
    const live = (t.by==='Explore' && DATA.lenses.subagents.live) ? ' live' : '';
    return `<div><div class="t-by${live}"><span class="dot"></span><b>${esc(t.by)}</b>${to}${t.at?`<span class="at">${t.at}</span>`:''}</div>
      <div class="t-say">${esc(t.say)}</div></div>`;
  }).join('') + `</div>`;
}
function lensPane(lens) {
  const L = DATA.lenses;
  if (lens==='context') return `<h4>Context loaded · ${L.context.count} items</h4>` + L.context.items.map(itemHtml).join('');
  if (lens==='hooks')   return `<h4>Hooks run · this turn</h4>` + L.hooks.items.map(itemHtml).join('');
  if (lens==='subagents') {
    const s = L.subagents;
    return `<div class="chan">${s.live?'<span class="live-dot"></span>':''}${esc(s.channel)} <span>· ${s.done?'done':'live'} · ${esc(s.meta)}</span></div>` + traceHtml(s.trace);
  }
  if (lens==='tunnel') return L.tunnel.items.map(t =>
    `<div class="chan">${esc(t.channel)} <span>· ${esc(t.kind)} · ${esc(t.at)}</span></div>` + traceHtml(t.trace)).join('');
  return '';
}

/* ================================================================== STREAM */
function renderStream(root) {
  const marks = [
    { lens:'context',  cls:'',     tick:'◦', lbl:`ContextLoaded`, n:`· ${DATA.lenses.context.count}` },
    { lens:'hooks',    cls:'',     tick:'◦', lbl:`HooksRun`,      n:`· ${DATA.lenses.hooks.count}` },
    { lens:'subagents',cls:DATA.lenses.subagents.live?'live':'done', tick:DATA.lenses.subagents.live?'●':'◦', lbl:`SubagentActivity`, n:`· Explore` },
    { lens:'tunnel',   cls:'',     tick:'◦', lbl:`TeamTunnel`,    n:`· Fable` },
  ];
  const markHtml = m => `<button class="mark ${m.cls}" data-lens="${m.lens}"><span class="rule"></span>
    <span class="lbl"><span class="tick">${m.tick}</span> ${m.lbl} <span class="n">${m.n}</span></span><span class="rule"></span></button>`;

  const partHtml = p => {
    const need = p.need ? `<span class="need">Needs you</span>` : '';
    const decision = (p.decision!=null) ? choiceRow(p.decision) : `<span class="p-reply">↳ RespondToThis</span>`;
    return `<div class="part${p.need?' needy':''}" data-n="${p.n}" data-part="${p.n}"${p.decision!=null?` data-di="${p.decision}"`:''}>
      <div class="p-lead"><span class="p-lead-t">${esc(p.lead)}</span>${need}</div>
      <div class="reveal-wrap"><div><div class="reveal-in"><div class="p-more">${esc(p.more)}</div>${decision}</div></div></div>
      ${p.decision!=null?'':''}</div>`;
  };

  root.innerHTML = `
  <div class="convo">
    ${convoHead()}
    <div class="stream"><div class="col">
      ${youBlock()}
      ${markHtml(marks[0])}
      <div style="margin:26px 0 8px">
        <div class="by"><b>Claude</b> · <span class="at">${DATA.reply.at}</span></div>
        <button class="said" id="s1-cap" style="border:0;background:none;text-align:left;cursor:pointer;color:var(--ink);font-size:14px;padding:0">${esc(DATA.reply.caption)}</button>
        <div class="reveal-wrap" id="s1-parts"><div><div class="reveal-in">
          <div class="parts">${DATA.reply.parts.map(partHtml).join('')}</div>
        </div></div></div>
      </div>
      ${markHtml(marks[1])}${markHtml(marks[2])}${markHtml(marks[3])}
    </div></div>
    <div class="compose"><div class="compose-inner">
      <div class="compose-ctx" id="s1-ctx">To Claude</div>
      <div class="box"><textarea placeholder="Reply, or click a line above to answer one part…"></textarea>
        <div class="box-foot"><span class="h">Return to send</span><button class="send" aria-label="Send">↑</button></div></div>
    </div></div>
  </div>
  <aside class="studio" id="s1-studio">
    <div class="studio-head"><span class="title" id="s1-title">Inspect</span>
      <div class="lens" id="s1-lens">
        <button data-lens="context">Context</button><button data-lens="hooks">Hooks</button>
        <button data-lens="subagents">Subagents</button><button data-lens="tunnel">Tunnel</button>
      </div><button class="x" id="s1-x" aria-label="Close">✕</button></div>
    <div class="studio-body">
      <div class="pane" data-lens="context">${lensPane('context')}</div>
      <div class="pane" data-lens="hooks">${lensPane('hooks')}</div>
      <div class="pane" data-lens="subagents">${lensPane('subagents')}</div>
      <div class="pane" data-lens="tunnel">${lensPane('tunnel')}</div>
    </div>
    <div class="hint-foot">Click any hairline in the stream to inspect it · click a line Claude said to answer just that part.</div>
  </aside>`;

  // wire
  const studio = root.querySelector('#s1-studio');
  const title = root.querySelector('#s1-title');
  const lensBtns = [...root.querySelectorAll('#s1-lens button')];
  const panes = [...root.querySelectorAll('#s1-studio .pane')];
  const NAMES = { context:'Context', hooks:'Hooks', subagents:'Subagents', tunnel:'Tunnel' };
  const open = lens => {
    studio.classList.add('open');
    lensBtns.forEach(b => b.classList.toggle('on', b.dataset.lens===lens));
    panes.forEach(p => p.classList.toggle('on', p.dataset.lens===lens));
    title.textContent = NAMES[lens] || 'Inspect';
  };
  root.querySelectorAll('.mark').forEach(m => m.addEventListener('click', () => open(m.dataset.lens)));
  lensBtns.forEach(b => b.addEventListener('click', () => open(b.dataset.lens)));
  root.querySelector('#s1-x').addEventListener('click', () => studio.classList.remove('open'));
  root.querySelector('#s1-cap').addEventListener('click', () => root.querySelector('#s1-parts').classList.toggle('open'));

  const ctx = root.querySelector('#s1-ctx');
  root.querySelectorAll('.part').forEach(p => {
    p.querySelector('.p-lead').addEventListener('click', e => { e.stopPropagation(); p.querySelector('.reveal-wrap').classList.toggle('open'); });
    const reply = p.querySelector('.p-reply');
    if (reply) reply.addEventListener('click', e => {
      e.stopPropagation();
      root.querySelectorAll('.part').forEach(o => o.classList.remove('sel'));
      p.classList.add('sel');
      ctx.innerHTML = 'Answering <b>Part ' + p.dataset.part + '</b> · ' + esc(p.querySelector('.p-lead-t').textContent);
    });
  });
  wireDecisions(root);
}

/* ================================================================== BACKSTAGE */
function renderBackstage(root) {
  const laneRows = rows => rows.map(r =>
    `<div class="lane-row"><span class="lr-k">${esc(r.k)}</span>${esc(r.v)}<span class="lr-m">${esc(r.m)}</span></div>`).join('');
  const L = DATA.lenses;
  const ctxRows = L.context.items.map(i => ({k:i.name.split(' · ')[0], v:i.sub, m:i.meta}));
  const hookRows = L.hooks.items.map(i => ({k:i.name, v:i.sub, m:i.tick?'✓':i.meta}));
  const subRows = L.subagents.trace.map(t => ({k:`${t.by}${t.to?' → '+t.to:''}`, v:t.say, m:t.at||''}));
  const tunRows = L.tunnel.items.flatMap(t => t.trace.map(x => ({k:t.channel.split(' · ')[0], v:x.say, m:t.kind})));

  root.innerHTML = `
  <div class="convo">
    ${convoHead()}
    <div class="stream"><div class="col">
      ${youBlock()}
      <div>
        <div class="by"><b>Claude</b> · <span class="at">${DATA.reply.at}</span></div>
        <button class="said" data-msg="b1" style="border:0;background:none;text-align:left;cursor:pointer;color:var(--ink);font-size:14px;padding:0">${esc(DATA.reply.caption)}</button>
        <div class="reveal-wrap" id="b1"><div><div class="reveal-in" style="padding-top:14px;color:var(--muted);font-weight:300;font-size:13px;line-height:1.7">
          ${esc(DATA.reply.parts.map(p=>p.lead).join(' '))} The two calls are yours to make — the backstage shows what led here.
        </div></div></div>
      </div>
      <div style="margin-top:40px;font-size:9.5px;letter-spacing:.03em;color:var(--faintest)">The conversation stays clean. Everything the agent did sits backstage, to the right — click a message to light what was happening underneath it.</div>
    </div></div>
    <div class="compose"><div class="compose-inner">
      <div class="compose-ctx">To Claude</div>
      <div class="box"><textarea placeholder="Reply to Claude…"></textarea>
        <div class="box-foot"><span class="h">Return to send</span><button class="send" aria-label="Send">↑</button></div></div>
    </div></div>
  </div>
  <aside class="studio dock">
    <div class="studio-head"><span class="title">Backstage</span></div>
    <div class="studio-body"><div class="lanes">
      <div class="lane"><button class="lane-head" aria-expanded="false"><span class="l-name">Context</span><span class="l-n">${L.context.count} loaded</span><span class="chev">›</span></button>
        <div class="lane-body"><div><div class="lane-rows">${laneRows(ctxRows)}</div></div></div></div>
      <div class="lane"><button class="lane-head" aria-expanded="false"><span class="l-name">Hooks</span><span class="l-n">${L.hooks.count} run</span><span class="chev">›</span></button>
        <div class="lane-body"><div><div class="lane-rows">${laneRows(hookRows)}</div></div></div></div>
      <div class="lane"><button class="lane-head" aria-expanded="false">${L.subagents.live?'<span class="l-live"></span>':''}<span class="l-name">Subagents</span><span class="l-n">Explore · ${L.subagents.done?'done':'live'}</span><span class="chev">›</span></button>
        <div class="lane-body"><div><div class="lane-rows">${laneRows(subRows)}</div></div></div></div>
      <div class="lane"><button class="lane-head" aria-expanded="false"><span class="l-name">Tunnel</span><span class="l-n">${L.tunnel.items.length} chat</span><span class="chev">›</span></button>
        <div class="lane-body"><div><div class="lane-rows">${laneRows(tunRows)}</div></div></div></div>
    </div></div>
    <div class="hint-foot">Front stage = what Claude said to you. Backstage = context, hooks, subagents and agent-to-agent chatter, time-aligned. Click a message to light the lanes.</div>
  </aside>`;

  root.querySelectorAll('.lane-head').forEach(h => h.addEventListener('click', () => {
    const open = h.nextElementSibling.classList.toggle('open');
    h.setAttribute('aria-expanded', String(open));
  }));
  root.querySelectorAll('[data-msg]').forEach(btn => btn.addEventListener('click', () => {
    root.querySelector('#'+btn.dataset.msg).classList.toggle('open');
    root.querySelectorAll('.lane').forEach((l, i) => setTimeout(() => {
      l.classList.add('pulse'); setTimeout(() => l.classList.remove('pulse'), 1400);
    }, i*160));
  }));
}

/* ================================================================== FACETS */
function renderFacets(root) {
  const facetHtml = p => `
    <div class="part" data-n="${p.n}" data-prov="${p.prov}"${p.decision!=null?` data-di="${p.decision}"`:''}>
      <div class="p-lead"><span class="p-lead-t">${esc(p.lead)}</span>${p.need?'<span class="need">Needs you</span>':''}</div>
      <div class="reveal-wrap"><div><div class="reveal-in"><div class="p-more">${esc(p.more)}</div>
        ${p.decision!=null?choiceRow(p.decision):'<span class="p-reply">↳ RespondToThis · Inspect</span>'}</div></div></div>
    </div>`;
  const provPane = (key, pv) => `<div class="pane" data-prov="${key}"><h4>${esc(pv.title)}</h4>${pv.items.map(itemHtml).join('')}</div>`;

  root.innerHTML = `
  <div class="convo">
    ${convoHead()}
    <div class="stream"><div class="col">
      ${youBlock()}
      <div class="by"><b>Claude</b> · <span class="at">${DATA.reply.at}</span></div>
      <div class="parts">${DATA.reply.parts.map(facetHtml).join('')}</div>
      <div style="margin-top:40px;font-size:9.5px;letter-spacing:.03em;color:var(--faintest)">Every line Claude said is its own facet. Click one to open it — read more, see where it came from, and answer just that.</div>
    </div></div>
    <div class="compose"><div class="compose-inner">
      <div class="compose-ctx" id="f-ctx">To Claude</div>
      <div class="box"><textarea id="f-ta" placeholder="Click a facet to answer it directly…"></textarea>
        <div class="box-foot"><span class="h">Return to send</span><button class="send" aria-label="Send">↑</button></div></div>
    </div></div>
  </div>
  <aside class="studio" id="f-studio">
    <div class="studio-head"><span class="title" id="f-title">Provenance</span><button class="x" id="f-x" aria-label="Close">✕</button></div>
    <div class="studio-body">
      ${Object.entries(DATA.prov).map(([k,v]) => provPane(k,v)).join('')}
    </div>
    <div class="hint-foot">This facet's provenance — the context, edits, hooks, subagents and agent chats behind exactly this line.</div>
  </aside>`;

  const studio = root.querySelector('#f-studio');
  const title = root.querySelector('#f-title');
  const panes = [...root.querySelectorAll('#f-studio .pane')];
  const ctx = root.querySelector('#f-ctx');
  const ta = root.querySelector('#f-ta');
  root.querySelectorAll('.part').forEach(p => {
    p.querySelector('.p-lead').addEventListener('click', () => {
      const wasSel = p.classList.contains('sel');
      root.querySelectorAll('.part').forEach(o => { o.classList.remove('sel'); o.querySelector('.reveal-wrap').classList.remove('open'); });
      if (wasSel) { studio.classList.remove('open'); ctx.textContent='To Claude'; return; }
      p.classList.add('sel');
      p.querySelector('.reveal-wrap').classList.add('open');
      studio.classList.add('open');
      panes.forEach(pa => pa.classList.toggle('on', pa.dataset.prov===p.dataset.prov));
      title.textContent = 'Facet ' + p.dataset.n;
      ctx.innerHTML = 'Answering <b>Facet ' + p.dataset.n + '</b>';
      ta.setAttribute('placeholder', 'Answer “' + p.querySelector('.p-lead-t').textContent + '”');
    });
  });
  root.querySelector('#f-x').addEventListener('click', () => {
    studio.classList.remove('open');
    root.querySelectorAll('.part').forEach(o => { o.classList.remove('sel'); o.querySelector('.reveal-wrap').classList.remove('open'); });
    ctx.textContent='To Claude';
  });
  wireDecisions(root);
}

/* -------- decisions: tap a choice → answer (sage). Both answered → release gold */
function wireDecisions(root) {
  root.querySelectorAll('.choice-row').forEach(rowEl => {
    rowEl.querySelectorAll('.choice').forEach(btn => btn.addEventListener('click', e => {
      e.stopPropagation();
      rowEl.querySelectorAll('.choice').forEach(c => c.classList.remove('picked'));
      btn.classList.add('picked');
      const part = rowEl.closest('.part'); if (part) part.classList.add('answered');
      // released? all decision parts in this scene answered
      const decisionParts = [...root.querySelectorAll('.part[data-di]')];
      if (decisionParts.length && decisionParts.every(p => p.classList.contains('answered'))) {
        const s = root.querySelector('[data-status]');
        if (s) { s.classList.remove('needs'); s.classList.add('ready');
          s.innerHTML = '<span class="dot"></span>Claude · Ready — running your calls'; }
        root.querySelectorAll('.part .need').forEach(n => n.textContent = 'Answered');
      }
    }));
  });
}

/* -------------------------------------------------- boot + scene switch */
renderStream(document.querySelector('.scene[data-scene="stream"]'));
renderBackstage(document.querySelector('.scene[data-scene="backstage"]'));
renderFacets(document.querySelector('.scene[data-scene="facets"]'));

const sceneBtns = [...document.querySelectorAll('.switch button')];
const scenes = [...document.querySelectorAll('.scene')];
sceneBtns.forEach(b => b.addEventListener('click', () => {
  sceneBtns.forEach(x => x.classList.toggle('on', x===b));
  scenes.forEach(s => s.classList.toggle('on', s.dataset.scene===b.dataset.scene));
}));
</script>
</body>
</html>
